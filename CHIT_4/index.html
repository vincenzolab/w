<!DOCTYPE html>
<html>
<head>
  <title>CSS Types Demo</title>

  <!-- Internal CSS -->
  <style>
    .internal {
      color: green;
      font-size: 20px;
    }
  </style>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2 style="text-align: center; font-size: 35px;">CSS Types Example</h2>

  <!-- Inline CSS -->
  <p style="color:red; font-size: 20px;">Inline CSS (inside tag)</p>

  <!-- Internal CSS -->
  <p class="internal">Internal CSS (inside head section)</p>

  <!-- External CSS -->
  <p class="external">External CSS (from style.css file)</p>

</body>
</html>
