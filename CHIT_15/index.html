<!DOCTYPE html>
<html lang="en">
<head>
    <title>Time Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Time Table</h1>

    <table border="1">
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
        <tr>
            <td>9:00 - 10:00</td>
            <td>Maths</td>
            <td>Physics</td>
            <td>Chemistry</td>
            <td>Biology</td>
            <td>Computer Science</td>
        </tr>
        <tr>
            <td>10:00 - 11:00</td>
            <td>English</td>
            <td>History</td>
            <td>Geography</td>
            <td>Political Science</td>
            <td>Economics</td>
        </tr>
        <tr>
            <td>11:00 - 11:30</td>
            <td colspan="5">Break</td>
        <tr>
            <td>11:30 - 12:30</td>
            <td>Lab</td>
            <td>Lab</td>
            <td>Sports</td>
            <td>Maths</td>
            <td>Lab</td>
        </tr>
    </table>
    
</body>
</html>
